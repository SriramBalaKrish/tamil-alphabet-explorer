  <title>Multilingual Alphabet Explorer</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #fff9f0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    }
    
    /* Interactive States & Animations */
    .home-card, .letter-card, .match-letter, .match-pic, .quiz-opt {
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    
    .home-card:hover, .letter-card:hover, .quiz-opt:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.1) !important;
    }

    /* Clear focus indicator for keyboard users */
    .home-card:focus-visible, .letter-card:focus-visible, 
    .match-letter:focus-visible, .match-pic:focus-visible, .quiz-opt:focus-visible {
      outline: 3px solid #0d6efd !important;
      outline-offset: 3px;
    }
    
    .letter-card.playing {
      border-color: #d97706 !important; /* Darker yellow for accessibility contrast */
      transform: scale(1.05);
    }
    
    .mascot {
      font-size: 70px;
      animation: bounce 1.2s infinite;
      display: inline-block;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* Game State Stylings - High Contrast Variations */
    .match-letter.selected, .match-pic.selected {
      border-color: #b45309 !important;
      background-color: #fef3c7 !important;
      transform: scale(1.03);
    }
    
    .match-letter.correct, .match-pic.correct {
      border-color: #157347 !important;
      background-color: #d1fae5 !important;
      pointer-events: none;
      opacity: 0.75;
    }
    
    .match-letter.wrong, .match-pic.wrong, .quiz-opt.wrong {
      border-color: #bb2d3b !important;
      background-color: #f8d7da !important;
      animation: shake 0.3s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .quiz-opt.correct {
      border-color: #157347 !important;
      background-color: #d1fae5 !important;
      animation: celebrate 0.4s;
    }
    @keyframes celebrate {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* Fixed Confetti Layer */
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1050;
    }
    
    /* Text Color Enhancements for Contrast (WCAG Compliance) */
    .text-purple-dark { color: #5b21b6 !important; }
    .text-blue-dark { color: #1e3a8a !important; }
    .text-success-dark { color: #065f46 !important; }
    .text-warning-dark { color: #854d0e !important; }
  </style>
</head>

let currentVoice = null;

function loadVoice() {
  if (!synth) return;
  const voices = synth.getVoices();
  const targetLang = dataset[currentLang].langCode;
  
  currentVoice = 
    voices.find(v => v.lang.includes(targetLang) && /female|woman/i.test(v.name)) ||
    voices.find(v => v.lang.includes(targetLang)) ||
    voices.find(v => v.lang.startsWith(targetLang.split('-')[0])) ||
    voices.find(v => /female|woman/i.test(v.name)) || 
    null;
}

if (synth && synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoice;
loadVoice();

function changeLanguage(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-bar button').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-pressed', 'false');
  });
  const activeLangBtn = document.getElementById(`btn-lang-${lang}`);
  activeLangBtn.classList.add('active');
  activeLangBtn.setAttribute('aria-pressed', 'true');
  
  document.getElementById('nav-vowels').innerText = currentLang === 'ta' ? 'அ Vowels' : currentLang === 'hi' ? 'अ Vowels' : 'A Vowels';
  document.getElementById('nav-consonants').innerText = currentLang === 'ta' ? 'க Consonants' : currentLang === 'hi' ? 'क Consonants' : 'B Consonants';
  
  loadVoice();
  showPage(currentPage);
}

// Sound FX Generators using Web Audio API
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playTone(freq, type, duration, vol=0.3) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(); osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function playCorrect() {
  playTone(523, 'sine', 0.15, 0.3);
  setTimeout(() => playTone(659, 'sine', 0.15, 0.3), 120);
  setTimeout(() => playTone(784, 'sine', 0.25, 0.35), 240);
}

function playWrong() {
  playTone(300, 'sawtooth', 0.2, 0.25);
  setTimeout(() => playTone(250, 'sawtooth', 0.2, 0.25), 150);
}

function playTap() { playTone(880, 'sine', 0.1, 0.15); }
function playMatch() { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.18,0.28), i*90)); }

let quizScore = 0;
let quizTotal = 0;
let quizCurrent = null;
let quizAnswered = false;
let matchState = { sel: null, selType: null, matched: new Set(), wrong: null };
let matchData = [];
let matchScore = 0;
let confettiAnim = null;

function speak(text) {
  if (!synth) return;
  synth.cancel();
  let u = new SpeechSynthesisUtterance(text);
  u.lang = dataset[currentLang].langCode;
  u.rate = 0.85;
  if (currentVoice) u.voice = currentVoice;
  synth.speak(u);
}

function speakLetter(letter, phoneticWord, cardEl) {
  if (cardEl) {
    cardEl.classList.add('playing');
    setTimeout(() => cardEl.classList.remove('playing'), 900);
  }
  playTap();
  speak(letter + '... ' + phoneticWord);
}

// Keyboard access helper function for synthetic components
function handleCardKey(event, action) {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    action();
  }
}

function showPage(p) {
  currentPage = p;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('active');
    b.removeAttribute('aria-current');
  });
  const currentNav = document.getElementById(`nav-${p}`);
  if(currentNav) {
    currentNav.classList.add('active');
    currentNav.setAttribute('aria-current', 'page');
  }
  
  const el = document.getElementById('page');
  const data = dataset[currentLang];

  if (p === 'home') el.innerHTML = renderHome(data);
  else if (p === 'vowels') el.innerHTML = renderAlpha('vowels', data);
  else if (p === 'consonants') el.innerHTML = renderAlpha('consonants', data);
  else if (p === 'match') { initMatch(); el.innerHTML = renderMatch(data); }
  else if (p === 'quiz') { initQuiz(); el.innerHTML = renderQuiz(data); }
}

function renderHome(data) {
  return `<div class="text-center py-4">
    <div class="mascot mb-2" role="img" aria-label="${data.mascotAlt}">🦜</div>
    <h1 class="display-5 fw-black text-purple-dark mb-1">${data.homeTitle}</h1>
    <p class="lead text-muted mb-4">${data.homeSub}</p>
    <div class="row g-3 justify-content-center">
      <div class="col-6 col-md-3">
        <div class="card h-100 border-0 shadow-sm home-card rounded-4 p-3 text-center" 
             role="button" tabindex="0" onclick="showPage('vowels')" onkeydown="handleCardKey(event, () => showPage('vowels'))" style="background-color: #ede9fe;">
          <div class="display-6 fw-bold text-purple-dark">${data.vowels[0].l}</div>
          <div class="fw-bold small text-secondary mt-2">${data.vowelLabel}</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card h-100 border-0 shadow-sm home-card rounded-4 p-3 text-center" 
             role="button" tabindex="0" onclick="showPage('consonants')" onkeydown="handleCardKey(event, () => showPage('consonants'))" style="background-color: #dbeafe;">
          <div class="display-6 fw-bold text-blue-dark">${data.consonants[0].l}</div>
          <div class="fw-bold small text-secondary mt-2">${data.consLabel}</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card h-100 border-0 shadow-sm home-card rounded-4 p-3 text-center" 
             role="button" tabindex="0" onclick="showPage('match')" onkeydown="handleCardKey(event, () => showPage('match'))" style="background-color: #d1fae5;">
          <div class="display-6" role="img" aria-label="🎯">🎯</div>
          <div class="fw-bold small text-success-dark mt-2">${data.matchLabel}</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card h-100 border-0 shadow-sm home-card rounded-4 p-3 text-center" 
             role="button" tabindex="0" onclick="showPage('quiz')" onkeydown="handleCardKey(event, () => showPage('quiz'))" style="background-color: #fef9c3;">
          <div class="display-6" role="img" aria-label="⭐">⭐</div>
          <div class="fw-bold small text-warning-dark mt-2">${data.quizLabel}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderAlpha(type, data) {
  const items = type === 'vowels' ? data.vowels : data.consonants;
  const isVowel = type === 'vowels';
  const borderStyle = isVowel ? 'border-top: 5px solid #8b5cf6;' : 'border-top: 5px solid #3b82f6;';
  const letterColorClass = isVowel ? 'text-purple-dark' : 'text-blue-dark';
  const title = isVowel ? data.vowelTitle : data.consTitle;
  
  let cards = items.map((it, i) => `
    <div class="col-4 col-sm-3 col-md-2">
      <div class="card h-100 bg-white border-3 border-transparent rounded-4 p-2 text-center shadow-sm letter-card" 
           role="button" tabindex="0" aria-label="Letter ${it.l}, pronounced as ${it.r}. Example word: ${it.wordDisplay}"
           style="${borderStyle}" id="lc${type}${i}" onclick="speakLetter('${it.l}','${it.word}',this)" onkeydown="handleCardKey(event, () => speakLetter('${it.l}','${it.word}',document.getElementById('lc${type}${i}')))">
        <div class="display-6 fw-bolder ${letterColorClass}">${it.l}</div>
        <div class="text-muted small fw-bold mb-1" style="font-size: 11px;">${it.r}</div>
        <div style="font-size: 2rem;" class="my-1" role="img" aria-label="${it.alt}">${it.pic}</div>
        <div class="fw-bold text-dark small text-truncate" style="font-size: 13px;">${it.wordDisplay}</div>
        <div class="text-black-50" style="font-size: 10px; margin-top:2px;">👆 tap!</div>
      </div>
    </div>`).join('');
    
  return `
    <h3 class="text-center fw-bold my-3">${title}</h3>
    <div class="row g-3 justify-content-center">${cards}</div>`;
}

function shuffle(arr) { return [...arr].sort(()=>Math.random()-.5); }

function initMatch() {
  const data = dataset[currentLang];
  const pool = shuffle([...data.vowels, ...data.consonants]).slice(0, 6);
  matchData = pool;
  matchState = { sel: null, selType: null, matched: new Set(), wrong: null };
  matchScore = 0;
}

function renderMatch(data) {
  const pics = shuffle(matchData.map((it,i)=>({...it,idx:i})));
  let letters = matchData.map((it,i)=>`
    <div class="card p-3 border-2 text-center fw-black rounded-4 shadow-sm match-letter mb-2" 
         role="button" tabindex="0" aria-label="Match item letter: ${it.l}"
         style="background-color: #ede9fe; color: #5b21b6; font-size: 1.8rem;" id="ml${i}" onclick="matchClick('letter',${i})" onkeydown="handleCardKey(event, () => matchClick('letter',${i}))">${it.l}</div>`).join('');
         
  let picsHtml = pics.map((it,i)=>`
    <div class="card p-2 border-2 text-center rounded-4 shadow-sm match-pic mb-2" 
         role="button" tabindex="0" aria-label="Match item picture: ${it.alt} associated with word ${it.wordDisplay}"
         id="mp${i}" data-idx="${it.idx}" onclick="matchClick('pic',${i})" onkeydown="handleCardKey(event, () => matchClick('pic',${i}))">
      <div style="font-size: 1.6rem; line-height:1;" role="img" aria-label="${it.alt}">${it.pic}</div>
      <div class="fw-bold text-muted mt-1" style="font-size: 11px;">${it.wordDisplay}</div>
    </div>`).join('');
    
  window._matchPics = pics;
  
  return `
    <h3 class="text-center fw-bold my-3">${data.matchTitle}</h3>
    <div class="row g-3 justify-content-center m-auto" style="max-width: 500px;">
      <div class="col-6">${letters}</div>
      <div class="col-6">${picsHtml}</div>
    </div>
    <div class="text-center mt-3">
      <button class="btn btn-success rounded-pill px-4 fw-bold shadow" onclick="initMatch();showPage('match')">🔄 New Game</button>
    </div>`;
}

function matchClick(type, idx) {
  const pics = window._matchPics;
  const data = dataset[currentLang];
  const currentEl = document.getElementById((type==='letter'?'ml':'mp')+idx);

  if (matchState.sel === null) {
    matchState.sel = idx;
    matchState.selType = type;
    currentEl?.classList.add('selected');
    currentEl?.setAttribute('aria-pressed', 'true');
  } else {
    const previousEl = document.getElementById((matchState.selType==='letter'?'ml':'mp')+matchState.sel);
    if (matchState.selType === type) {
      previousEl?.classList.remove('selected');
      previousEl?.removeAttribute('aria-pressed');
      matchState.sel = idx;
      currentEl?.classList.add('selected');
      currentEl?.setAttribute('aria-pressed', 'true');
      return;
    }
    let letterIdx = type === 'letter' ? idx : matchState.sel;
    let picSlot = type === 'pic' ? idx : matchState.sel;
    const picDataIdx = pics[picSlot].idx;
    const lEl = document.getElementById('ml'+letterIdx);
    const pEl = document.getElementById('mp'+picSlot);
    
    if (letterIdx === picDataIdx) {
      lEl?.classList.remove('selected'); lEl?.classList.add('correct');
      pEl?.classList.remove('selected'); pEl?.classList.add('correct');
      lEl?.setAttribute('aria-disabled', 'true');
      pEl?.setAttribute('aria-disabled', 'true');
      lEl?.removeAttribute('aria-pressed');
      pEl?.removeAttribute('aria-pressed');
      matchScore++;
      playMatch();
      speak(matchData[letterIdx].l + '... ' + matchData[letterIdx].word);
      if (matchScore === matchData.length) { 
        setTimeout(()=>{ launchConfetti(); speak(data.successMsg); }, 200); 
      }
    } else {
      playWrong();
      if (lEl) { 
        lEl.classList.remove('selected'); lEl.classList.add('wrong'); 
        lEl.removeAttribute('aria-pressed');
        setTimeout(()=>lEl.classList.remove('wrong'),500); 
      }
      if (pEl) { 
        pEl.classList.remove('selected'); pEl.classList.add('wrong'); 
        pEl.removeAttribute('aria-pressed');
        setTimeout(()=>pEl.classList.remove('wrong'),500); 
      }
    }
    matchState.sel = null;
    matchState.selType = null;
  }
}

function initQuiz() {
  quizScore = 0; quizTotal = 0; quizAnswered = false;
  nextQuiz();
}

function nextQuiz() {
  quizAnswered = false;
  const data = dataset[currentLang];
  const all = [...data.vowels, ...data.consonants];
  const correct = all[Math.floor(Math.random()*all.length)];
  let opts = [correct];
  while (opts.length < 4) {
    const o = all[Math.floor(Math.random()*all.length)];
    if (!opts.find(x=>x.l===o.l)) opts.push(o);
  }
  quizCurrent = { correct, opts: shuffle(opts) };
  quizTotal++;
}

function renderQuiz(data) {
  if (!quizCurrent) return '';
  const {correct, opts} = quizCurrent;
  let optHtml = opts.map((o, i)=>`
    <div class="col-6">
      <div class="card bg-white p-3 border-3 border-transparent rounded-4 shadow-sm text-center quiz-opt h-100" 
           role="button" tabindex="0" aria-label="Option ${i+1}: ${o.wordDisplay}"
           id="qo${i}" onclick="checkQuiz(${i})" onkeydown="handleCardKey(event, () => checkQuiz(${i}))">
        <div class="display-5" role="img" aria-label="${o.alt}">${o.pic}</div>
        <div class="fw-bold text-secondary mt-1" style="font-size: 13px;">${o.wordDisplay}</div>
      </div>
    </div>`).join('');
    
  return `
    <div class="text-center py-2">
      <div class="display-2 fw-black text-purple-dark bounce-in" style="font-weight:900;" aria-label="Identify letter: ${correct.l}">${correct.l}</div>
      <p class="text-muted fw-bold">${data.quizPrompt}</p>
    </div>
    <div class="row g-3 m-auto mb-3" style="max-width: 480px;">${optHtml}</div>
    <div class="text-center fw-bold fs-5 text-purple-dark" aria-live="polite">Score: ${quizScore} / ${quizTotal - 1}</div>`;
}

function checkQuiz(i) {
  if (quizAnswered) return;
  quizAnswered = true;
  const data = dataset[currentLang];
  const {correct, opts} = quizCurrent;
  const chosen = opts[i];
  const el = document.getElementById('qo'+i);
  
  if (chosen.l === correct.l) {
    el.classList.add('correct');
    quizScore++;
    playCorrect();
    speak(data.correctSpeech + ' ' + correct.l + '... ' + correct.word);
    launchConfetti();
  } else {
    el.classList.add('wrong');
    const ci = opts.findIndex(o=>o.l===correct.l);
    document.getElementById('qo'+ci)?.classList.add('correct');
    playWrong();
    speak(data.wrongSpeech + ' ' + correct.l + '... ' + correct.word);
  }
  setTimeout(()=>{ nextQuiz(); showPage('quiz'); }, 1800);
}

// Full Canvas Particles Confetti System
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = Array.from({length:80},()=>({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height-canvas.height,
    r: Math.random()*6+4, d: Math.random()*80+40,
    color: ['#a855f7','#3b82f6','#f59e0b','#10b981','#f43f5e'][Math.floor(Math.random()*5)],
    tilt: Math.random()*10-10, tiltAngle: 0, tiltSpeed: Math.random()*.07+.05
  }));
  let t = 0;
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.tiltAngle += p.tiltSpeed; p.y += (Math.cos(t+p.d)+1.5)*1.8; p.x += Math.sin(t)*1.2; p.tilt = Math.sin(p.tiltAngle)*12;
      ctx.beginPath(); ctx.lineWidth=p.r; ctx.strokeStyle = p.color;
      ctx.moveTo(p.x+p.tilt+p.r/3,p.y); ctx.lineTo(p.x+p.tilt,p.y+p.tilt+p.r/2); ctx.stroke();
    });
    t+=.04;
    if (t < 3.5) confettiAnim = requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// Boot up app initialization
showPage('home');
</script>
